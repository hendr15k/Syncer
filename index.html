<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Multi-Speaker TTS Reader — ladet PDFs, EPUBs oder Plain Text hoch und lasst sie euch als Bühenshow mit Szenen-Bildern vorlesen. Gemini TTS, Voice Selection.">
    <meta name="theme-color" content="#111827">
    <title>AI Stage Reader — Multi-Speaker TTS</title>
    <script>
      (() => {
        const STORAGE_KEY = 'syncer-dark-mode';
        const root = document.documentElement;
        const metaTheme = document.querySelector('meta[name="theme-color"]');
        const media = window.matchMedia('(prefers-color-scheme: dark)');

        const getPreferredTheme = () => {
          try {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored === 'dark' || stored === 'light') return stored;
          } catch {}
          return media.matches ? 'dark' : 'light';
        };

        const applyTheme = (theme) => {
          root.dataset.theme = theme;
          if (metaTheme) {
            metaTheme.setAttribute('content', theme === 'dark' ? '#111827' : '#fafaf9');
          }
        };

        applyTheme(getPreferredTheme());

        window.__syncerTheme = {
          storageKey: STORAGE_KEY,
          media,
          getPreferredTheme,
          applyTheme,
        };
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

      :root[data-theme='dark'] #root button:hover {

      :root[data-theme='dark'] #root .shadow,
      :root[data-theme='dark'] #root .shadow-sm,
      :root[data-theme='dark'] #root .shadow-md,
      :root[data-theme='dark'] #root .shadow-lg,
      :root[data-theme='dark'] #root .shadow-xl,
      :root[data-theme='dark'] #root [class*='shadow-'] {
        box-shadow: var(--syncer-shadow) !important;
      }

      .syncer-theme-toggle {
        position: fixed;
        top: 1rem;
        right: 1rem;
        z-index: 9999;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 9999px;
        border: 1px solid var(--syncer-border);
        background: var(--syncer-surface-strong);
        color: var(--syncer-text);
        box-shadow: var(--syncer-shadow);
        backdrop-filter: blur(14px);
        cursor: pointer;
      }

      .syncer-theme-toggle:hover {
        background: var(--syncer-button-hover);
      }

      .syncer-theme-toggle:focus-visible {
        outline: 2px solid var(--syncer-accent);
        outline-offset: 2px;
      }

      .syncer-theme-toggle svg {
        width: 1.2rem;
        height: 1.2rem;
      }

      .syncer-theme-toggle .syncer-theme-icon-sun {
        display: none;
      }

      :root[data-theme='dark'] .syncer-theme-toggle .syncer-theme-icon-moon {
        display: none;
      }

      :root[data-theme='dark'] .syncer-theme-toggle .syncer-theme-icon-sun {
        display: block;
      }

      @media (max-width: 767px) {
        html {
          font-size: 14px;
        }

        body {
          overflow-x: hidden;
          overscroll-behavior-y: contain;
        }

        #root > div {
          min-height: 100vh;
          max-width: 100vw;
          overflow-x: hidden;
        }

        .syncer-theme-toggle {
          top: max(0.75rem, env(safe-area-inset-top, 0px));
          right: max(0.75rem, env(safe-area-inset-right, 0px));
          width: 3rem;
          height: 3rem;
        }

        #root header {
          height: auto !important;
          min-height: 4rem;
          padding: 0.75rem 1rem !important;
          gap: 0.75rem;
          align-items: flex-start !important;
          flex-wrap: wrap;
        }

        #root header h1 {
          font-size: 1rem !important;

          padding-right: 3.5rem;
        }

        #root main {
          min-width: 0;

        #root main > .flex-1.overflow-y-auto {
          padding: 1rem 0.875rem 8rem !important;

        #root .md\:hidden.border-b > div:first-child {

        #root .md\:hidden button,

        #root .md\:hidden button {

        #root .absolute.bottom-6.right-6 {

        #root > div > .h-24 > .flex-1 > div:first-child {

        #root > div > .h-24 > .flex-1 > div:last-child {

        #root > div > .h-24 > button:last-child {

          flex-direction: row !important;
          justify-content: center;

        }

        #root > div > .h-24 > button:last-child span {

          font-size: 0.72rem !important;
        }
      }
    </style>

  <body class="antialiased overflow-hidden">
    <button
      id="syncer-theme-toggle"
      class="syncer-theme-toggle"
      type="button"
      aria-label="Toggle dark mode"
      aria-pressed="false"
      title="Toggle dark mode"
    >
      <svg class="syncer-theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3c0 4.97 4.03 9 9 9 .27 0 .53-.01.79-.03"></path>
      </svg>
      <svg class="syncer-theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="5"></circle>
        <path d="M12 1v2"></path>
        <path d="M12 21v2"></path>
        <path d="M4.22 4.22l1.42 1.42"></path>
        <path d="M18.36 18.36l1.42 1.42"></path>
        <path d="M1 12h2"></path>
        <path d="M21 12h2"></path>
        <path d="M4.22 19.78l1.42-1.42"></path>
        <path d="M18.36 5.64l1.42-1.42"></path>
      </svg>
    </button>
    <div id="root"></div>
    <script>
      (() => {
        const themeApi = window.__syncerTheme;
        const toggle = document.getElementById('syncer-theme-toggle');
        if (!themeApi || !toggle) return;

        const updateToggleState = (theme) => {
          const dark = theme === 'dark';
          toggle.setAttribute('aria-pressed', String(dark));
          toggle.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
          toggle.setAttribute('title', dark ? 'Switch to light mode' : 'Switch to dark mode');
        };

        const getCurrentTheme = () => document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';

        updateToggleState(getCurrentTheme());

        toggle.addEventListener('click', () => {
          const nextTheme = getCurrentTheme() === 'dark' ? 'light' : 'dark';
          themeApi.applyTheme(nextTheme);
          updateToggleState(nextTheme);
          try {
            localStorage.setItem(themeApi.storageKey, nextTheme);
          } catch {}
        });

        const handleSystemThemeChange = (event) => {
          try {
            const hasStored = localStorage.getItem(themeApi.storageKey);
            if (hasStored === 'dark' || hasStored === 'light') return;
          } catch {}
          const nextTheme = event.matches ? 'dark' : 'light';
          themeApi.applyTheme(nextTheme);
          updateToggleState(nextTheme);
        };

        if (typeof themeApi.media.addEventListener === 'function') {
          themeApi.media.addEventListener('change', handleSystemThemeChange);
        } else if (typeof themeApi.media.addListener === 'function') {
          themeApi.media.addListener(handleSystemThemeChange);
        }
      })();
    </script>
  <script type="module" src="/index.tsx"></script>
